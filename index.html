<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polymarket Orderbook Scanner</title>
<style>
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#07111f;
color:#fff;
margin:0;
padding:22px;
}
h1{
margin:0 0 24px;
font-size:32px;
font-weight:800;
}
.card{
background:#0d1b38;
border-radius:18px;
padding:18px;
margin-bottom:18px;
}
.label{
color:rgba(255,255,255,.75);
font-size:13px;
margin-bottom:10px;
}
.stat{
font-size:30px;
font-weight:800;
color:#15f47a;
}
input{
width:100%;
box-sizing:border-box;
padding:14px;
border-radius:14px;
border:none;
font-size:16px;
margin-bottom:14px;
}
button{
background:#15d95e;
color:#fff;
border:none;
border-radius:16px;
padding:16px 24px;
font-size:17px;
font-weight:700;
cursor:pointer;
}
.full{width:100%;}
pre{
white-space:pre-wrap;
word-break:break-word;
font-size:13px;
line-height:1.45;
margin:0;
font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
}
.result-title{
font-weight:800;
font-size:17px;
margin-bottom:8px;
line-height:1.35;
}
.muted{
color:rgba(255,255,255,.75);
font-size:14px;
line-height:1.5;
}
.edge{
color:#15f47a;
font-weight:700;
}
.pill{
display:inline-block;
padding:8px 12px;
border-radius:999px;
font-size:12px;
font-weight:700;
margin-top:10px;
}
.pill-arb{
background:rgba(255,80,120,.18);
color:#ff7a9b;
}
.grid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:14px;
}
@media (max-width:700px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<h1>Polymarket Orderbook Scanner</h1>

<div class="card">
  <div class="label">Worker Proxy URL</div>
  <input id="proxy" placeholder="https://your-worker.workers.dev">
  <button onclick="saveProxy()">Save Proxy</button>
</div>

<div class="grid">
  <div class="card">
    <div class="label">Scan Limit</div>
    <input id="scanLimit" type="number" value="120">
    <button onclick="saveSettings()">Save Settings</button>
  </div>
  <div class="card">
    <div class="label">Arbitrage Threshold (%)</div>
    <input id="arbThreshold" type="number" step="0.1" value="0.5">
    <button onclick="saveSettings()">Save Settings</button>
  </div>
</div>

<button class="full" onclick="runScan()">Scan Markets</button>

<div class="grid">
  <div class="card">
    <div class="label">Status</div>
    <div id="status">Idle</div>
  </div>
  <div class="card">
    <div class="label">Markets Scanned</div>
    <div id="markets" class="stat">0</div>
  </div>
  <div class="card">
    <div class="label">Arbitrage Hits</div>
    <div id="arbHits" class="stat">0</div>
  </div>
  <div class="card">
    <div class="label">Books Read</div>
    <div id="booksRead" class="stat">0</div>
  </div>
</div>

<div class="card">
  <div class="label">Debug</div>
  <pre id="debug">No messages yet.</pre>
</div>

<div class="card">
  <div class="label">Arbitrage Opportunities</div>
  <div id="arbResults"></div>
</div>

<script>
function saveProxy(){
  const url = document.getElementById("proxy").value.trim().replace(/\/+$/,"");
  localStorage.setItem("proxy", url);
  document.getElementById("status").innerText = "Proxy saved";
  document.getElementById("debug").innerText = "Saved proxy: " + url;
}

function getProxy(){
  return (localStorage.getItem("proxy") || "").replace(/\/+$/,"");
}

function saveSettings(){
  localStorage.setItem("scanLimit", document.getElementById("scanLimit").value || "120");
  localStorage.setItem("arbThreshold", document.getElementById("arbThreshold").value || "0.5");
  document.getElementById("status").innerText = "Settings saved";
}

function tryParseJSON(value){
  if (typeof value !== "string") return value;
  try { return JSON.parse(value); } catch { return value; }
}

function parseTokenIds(value){
  const raw = tryParseJSON(value);
  if (Array.isArray(raw)) return raw.map(x => String(x));
  if (typeof raw === "string" && raw.includes(",")) {
    return raw.split(",").map(x => x.trim().replace(/^"+|"+$/g,"")).filter(Boolean);
  }
  return [];
}

async function fetchJSON(url){
  const res = await fetch(url);
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch {
    throw new Error("Non-JSON response from " + url + "\\n\\n" + text.slice(0,300));
  }
}

function bestAskFromBook(book){
  const asks = book && Array.isArray(book.asks) ? book.asks : [];
  if (!asks.length) return null;
  const px = parseFloat(asks[0].price);
  return Number.isFinite(px) ? px : null;
}

function createArbCard(row){
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <div class="result-title">${row.question}</div>
    <div class="muted">YES ask ${row.yesAsk.toFixed(4)} · NO ask ${row.noAsk.toFixed(4)}</div>
    <div class="muted">Total ${row.total.toFixed(4)} · Arb Edge <span class="edge">${row.edgePct.toFixed(2)}%</span></div>
    <div class="pill pill-arb">Arbitrage</div>
  `;
  return div;
}

async function runScan(){
  const proxy = getProxy();
  const status = document.getElementById("status");
  const debug = document.getElementById("debug");
  const marketsEl = document.getElementById("markets");
  const arbHitsEl = document.getElementById("arbHits");
  const booksReadEl = document.getElementById("booksRead");
  const arbResults = document.getElementById("arbResults");

  arbResults.innerHTML = "";
  marketsEl.innerText = "0";
  arbHitsEl.innerText = "0";
  booksReadEl.innerText = "0";

  if (!proxy) {
    status.innerText = "Missing proxy";
    debug.innerText = "Paste your Worker URL first and tap Save Proxy.";
    return;
  }

  try {
    status.innerText = "Loading markets...";
    const markets = await fetchJSON(proxy + "/api/markets");

    if (!Array.isArray(markets)) {
      throw new Error("Markets response was not an array.");
    }

    const limit = parseInt(localStorage.getItem("scanLimit") || "120", 10) || 120;
    const arbThreshold = (parseFloat(localStorage.getItem("arbThreshold") || "0.5") || 0.5) / 100;

    let scanned = 0;
    let arbHits = 0;
    let booksRead = 0;
    let skippedNoTokens = 0;
    let skippedNoBooks = 0;

    const selected = markets.slice(0, limit);

    for (const m of selected) {
      const tokenIds = parseTokenIds(m.clobTokenIds);

      if (tokenIds.length < 2) {
        skippedNoTokens++;
        continue;
      }

      const yesToken = tokenIds[0];
      const noToken = tokenIds[1];

      try {
        const [yesBook, noBook] = await Promise.all([
          fetchJSON(proxy + "/api/book?token_id=" + encodeURIComponent(yesToken)),
          fetchJSON(proxy + "/api/book?token_id=" + encodeURIComponent(noToken))
        ]);

        booksRead += 2;
        booksReadEl.innerText = String(booksRead);

        const yesAsk = bestAskFromBook(yesBook);
        const noAsk = bestAskFromBook(noBook);

        if (!Number.isFinite(yesAsk) || !Number.isFinite(noAsk)) {
          skippedNoBooks++;
          continue;
        }

        scanned++;
        marketsEl.innerText = String(scanned);

        const total = yesAsk + noAsk;
        const edgePct = (1 - total) * 100;

        if ((1 - total) > arbThreshold) {
          arbHits++;
          arbHitsEl.innerText = String(arbHits);

          arbResults.appendChild(createArbCard({
            question: m.question || "Untitled market",
            yesAsk,
            noAsk,
            total,
            edgePct
          }));
        }

        status.innerText = "Scanning... " + scanned + " valid markets";
      } catch (err) {
        skippedNoBooks++;
      }
    }

    if (!arbHits) {
      const empty = document.createElement("div");
      empty.className = "muted";
      empty.innerText = "No arbitrage opportunities found at the current threshold.";
      arbResults.appendChild(empty);
    }

    status.innerText = "Done";
    debug.innerText =
      "Markets returned: " + markets.length +
      "\\nMarkets checked: " + selected.length +
      "\\nValid markets scanned: " + scanned +
      "\\nBooks read: " + booksRead +
      "\\nSkipped (no tokens): " + skippedNoTokens +
      "\\nSkipped (no books/asks): " + skippedNoBooks +
      "\\nArbitrage hits: " + arbHits +
      "\\nThreshold: " + (arbThreshold * 100).toFixed(2) + "%";
  } catch (err) {
    status.innerText = "Failed";
    debug.innerText = err && err.message ? err.message : String(err);
  }
}

window.addEventListener("load", async () => {
  const savedProxy = getProxy();
  if (savedProxy) document.getElementById("proxy").value = savedProxy;

  document.getElementById("scanLimit").value = localStorage.getItem("scanLimit") || "120";
  document.getElementById("arbThreshold").value = localStorage.getItem("arbThreshold") || "0.5";
});
</script>

</body>
</html>
