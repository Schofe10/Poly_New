<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Polymarket Edge Finder</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #07111f;
      color: #fff;
      margin: 0;
      padding: 22px;
    }

    h1 {
      margin: 0 0 24px 0;
      font-size: 34px;
      font-weight: 800;
    }

    .card {
      background: #0d1b38;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .label {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .stat {
      font-size: 30px;
      font-weight: 800;
      color: #15f47a;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      margin-bottom: 14px;
    }

    button {
      background: #15d95e;
      color: white;
      border: none;
      border-radius: 16px;
      padding: 16px 24px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    .full {
      width: 100%;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.45;
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .result-title {
      font-weight: 800;
      font-size: 17px;
      margin-bottom: 8px;
    }

    .muted {
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Polymarket Edge Finder</h1>

  <div class="card">
    <div class="label">Proxy URL</div>
    <input id="proxy" placeholder="https://polymarket-proxy.d-schofe.workers.dev" />
    <button onclick="saveProxy()">Save Proxy</button>
  </div>

  <button class="full" onclick="runScan()">Scan Markets</button>

  <div class="card">
    <div class="label">Status</div>
    <div id="status" class="muted">Idle</div>
  </div>

  <div class="card">
    <div class="label">Markets scanned</div>
    <div id="markets" class="stat">0</div>
  </div>

  <div class="card">
    <div class="label">Arbitrage hits</div>
    <div id="arb" class="stat">0</div>
  </div>

  <div class="card">
    <div class="label">Debug</div>
    <pre id="debug">No messages yet.</pre>
  </div>

  <div id="results"></div>

  <script>
    const statusEl = document.getElementById("status");
    const marketsEl = document.getElementById("markets");
    const arbEl = document.getElementById("arb");
    const debugEl = document.getElementById("debug");
    const resultsEl = document.getElementById("results");
    const proxyEl = document.getElementById("proxy");

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function setDebug(msg) {
      debugEl.textContent = msg;
    }

    function saveProxy() {
      const url = proxyEl.value.trim().replace(/\/+$/, "");
      localStorage.setItem("proxy", url);
      setStatus("Proxy saved");
      setDebug("Saved proxy:\n" + url);
    }

    function getProxy() {
      return (localStorage.getItem("proxy") || "").trim().replace(/\/+$/, "");
    }

    function tryParseJSON(value) {
      if (typeof value !== "string") return value;
      try {
        return JSON.parse(value);
      } catch {
        return value;
      }
    }

    function cleanId(v) {
      if (v === null || v === undefined) return null;
      if (typeof v === "number") return String(v);
      if (typeof v === "string") {
        const s = v.trim().replace(/^"+|"+$/g, "");
        return s || null;
      }
      return null;
    }

    function parseOutcomePrices(value) {
      const raw = tryParseJSON(value);

      if (Array.isArray(raw)) {
        const nums = raw.map(v => parseFloat(v)).filter(v => Number.isFinite(v));
        return nums;
      }

      if (typeof raw === "string" && raw.includes(",")) {
        return raw.split(",").map(v => parseFloat(v.trim())).filter(v => Number.isFinite(v));
      }

      return [];
    }

    function resultCard(market, yesPrice, noPrice, edgePct) {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <div class="result-title">${market.question || market.title || "Untitled market"}</div>
        <div class="muted">YES ${yesPrice.toFixed(3)} · NO ${noPrice.toFixed(3)}</div>
        <div class="muted">Total ${(yesPrice + noPrice).toFixed(3)} · Edge ${edgePct.toFixed(2)}%</div>
      `;
      return div;
    }

    async function fetchJSON(url) {
      const res = await fetch(url);
      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch {
        throw new Error("Non-JSON response from " + url + "\n\n" + text.slice(0, 300));
      }
    }

    async function runScan() {
      resultsEl.innerHTML = "";
      marketsEl.textContent = "0";
      arbEl.textContent = "0";

      const proxy = getProxy();
      if (!proxy) {
        setStatus("Missing proxy");
        setDebug("Enter your Worker base URL and tap Save Proxy first.");
        return;
      }

      setStatus("Loading markets...");
      setDebug("Using proxy:\n" + proxy);

      let validScanned = 0;
      let arbHits = 0;
      let skippedNoPrices = 0;
      let skippedClosed = 0;
      let firstSample = null;

      try {
        const markets = await fetchJSON(proxy + "/api/markets");

        if (!Array.isArray(markets)) {
          throw new Error("Markets response was not an array.");
        }

        setStatus("Loaded " + markets.length + " markets. Scanning...");

        for (const market of markets) {
          try {
            if (market.closed === true || market.active === false) {
              skippedClosed++;
              continue;
            }

            const prices = parseOutcomePrices(market.outcomePrices);

            if (!firstSample) {
              firstSample = {
                question: market.question || null,
                outcomePrices: market.outcomePrices ?? null,
                parsedOutcomePrices: prices,
                active: market.active,
                closed: market.closed
              };
            }

            if (prices.length < 2) {
              skippedNoPrices++;
              continue;
            }

            const yesPrice = prices[0];
            const noPrice = prices[1];

            if (!Number.isFinite(yesPrice) || !Number.isFinite(noPrice)) {
              skippedNoPrices++;
              continue;
            }

            validScanned++;
            marketsEl.textContent = String(validScanned);

            const total = yesPrice + noPrice;
            const edgePct = (1 - total) * 100;

            if (total < 1) {
              arbHits++;
              arbEl.textContent = String(arbHits);
              resultsEl.appendChild(resultCard(market, yesPrice, noPrice, edgePct));
            }

            setStatus("Scanning... " + validScanned + " valid markets");
          } catch (err) {
            skippedNoPrices++;
          }
        }

        setStatus("Done");
        setDebug(
          "Finished scan\n" +
          "Markets returned: " + markets.length + "\n" +
          "Valid markets scanned: " + validScanned + "\n" +
          "Skipped (closed/inactive): " + skippedClosed + "\n" +
          "Skipped (no prices): " + skippedNoPrices + "\n" +
          "Arb hits: " + arbHits + "\n\n" +
          "First market sample:\n" +
          JSON.stringify(firstSample, null, 2)
        );
      } catch (err) {
        setStatus("Failed");
        setDebug(
          "Scan failed:\n" +
          (err && err.message ? err.message : String(err))
        );
      }
    }

    window.addEventListener("load", () => {
      const saved = getProxy();
      if (saved) proxyEl.value = saved;
    });
  </script>
</body>
</html>
