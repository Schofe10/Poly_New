<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Polymarket Edge Finder Turbo</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#07111f;
color:#fff;
margin:0;
padding:22px;
}

h1{
margin:0 0 24px;
font-size:34px;
font-weight:800;
}

.card{
background:#0d1b38;
border-radius:20px;
padding:20px;
margin-bottom:20px;
}

.label{
color:rgba(255,255,255,.75);
font-size:13px;
margin-bottom:10px;
}

.stat{
font-size:30px;
font-weight:800;
color:#15f47a;
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
font-size:16px;
margin-bottom:14px;
}

button{
background:#15d95e;
color:white;
border:none;
border-radius:16px;
padding:16px 24px;
font-size:17px;
font-weight:700;
cursor:pointer;
}

.full{width:100%;}

.result-title{
font-weight:800;
font-size:17px;
margin-bottom:8px;
}

.muted{
color:rgba(255,255,255,.75);
font-size:14px;
}

.edge{
color:#15f47a;
font-weight:700;
}

.pill{
display:inline-block;
padding:8px 12px;
border-radius:999px;
font-size:12px;
font-weight:700;
margin-top:10px;
}

.pill-strong{background:rgba(21,244,122,.18);color:#15f47a;}
.pill-buy{background:rgba(100,200,255,.18);color:#78c9ff;}
.pill-watch{background:rgba(255,211,77,.18);color:#ffd34d;}
.pill-none{background:rgba(255,255,255,.12);color:rgba(255,255,255,.75);}

.section-title{
font-size:20px;
font-weight:800;
margin:28px 0 14px;
}
</style>
</head>

<body>

<h1>Polymarket Turbo Scanner</h1>

<div class="card">
<div class="label">Proxy URL</div>
<input id="proxy" placeholder="https://polymarket-proxy.yourname.workers.dev"/>
<button onclick="saveProxy()">Save Proxy</button>
</div>

<button class="full" onclick="runScan()">Scan Markets</button>

<div class="card">
<div class="label">Status</div>
<div id="status">Idle</div>
</div>

<div class="card">
<div class="label">Markets scanned</div>
<div id="markets" class="stat">0</div>
</div>

<div class="card">
<div class="label">Edge Opportunities</div>
<div id="hits" class="stat">0</div>
</div>

<div class="section-title">Top Opportunities</div>
<div id="results"></div>

<script>

function saveProxy(){
const url=document.getElementById("proxy").value.trim().replace(/\/+$/,"")
localStorage.setItem("proxy",url)
}

function getProxy(){
return(localStorage.getItem("proxy")||"").replace(/\/+$/,"")
}

function parseOutcomePrices(value){

if(!value) return []

try{
const parsed=JSON.parse(value)
if(Array.isArray(parsed)){
return parsed.map(x=>parseFloat(x)).filter(x=>Number.isFinite(x))
}
}catch{}

return []
}

function heuristicFair(yes){

let fair=yes

if(yes<0.15) fair+=0.02
if(yes>0.85) fair-=0.02

return Math.max(.01,Math.min(.99,fair))
}

async function runScan(){

const proxy=getProxy()

if(!proxy){
alert("Set proxy first")
return
}

const status=document.getElementById("status")
const marketsEl=document.getElementById("markets")
const hitsEl=document.getElementById("hits")
const results=document.getElementById("results")

results.innerHTML=""
status.innerText="Loading markets..."

let markets=[]

try{

const r=await fetch(proxy+"/api/markets")
markets=await r.json()

}catch(e){
status.innerText="Failed loading markets"
return
}

let scanned=0
let hits=0

for(const m of markets){

const prices=parseOutcomePrices(m.outcomePrices)

if(prices.length<2) continue

const yes=prices[0]
const no=prices[1]

if(!Number.isFinite(yes)||!Number.isFinite(no)) continue

scanned++

const fair=heuristicFair(yes)
const edge=fair-yes

if(edge>0.02){

hits++

const div=document.createElement("div")
div.className="card"

let signal="Watch"
let pill="pill-watch"

if(edge>0.1){signal="Strong Buy";pill="pill-strong"}
else if(edge>0.05){signal="Buy";pill="pill-buy"}

div.innerHTML=`
<div class="result-title">${m.question}</div>
<div class="muted">YES ${yes.toFixed(3)} Â· NO ${no.toFixed(3)}</div>
<div class="muted">Edge <span class="edge">${(edge*100).toFixed(2)}%</span></div>
<div class="pill ${pill}">${signal}</div>
`

results.appendChild(div)

}

}

marketsEl.innerText=scanned
hitsEl.innerText=hits
status.innerText="Done"

}

</script>

</body>
</html>
