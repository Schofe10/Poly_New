<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Polymarket Edge Finder</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont;
background:#0b0f14;
color:white;
padding:20px;
}

button{
padding:14px 20px;
background:#00c853;
border:none;
border-radius:10px;
color:white;
font-size:16px;
margin-top:10px;
}

.card{
background:#111827;
padding:16px;
margin-top:14px;
border-radius:10px;
}

.stat{
font-size:28px;
font-weight:bold;
color:#00e676;
}

.small{
opacity:.7;
font-size:13px;
}
</style>
</head>

<body>

<h2>Polymarket Edge Finder</h2>

<div class="card">
<div class="small">Proxy URL</div>
<input id="proxy" placeholder="https://schofe.workers.dev"
style="width:100%;padding:10px;border-radius:8px;margin-top:6px">
<button onclick="saveProxy()">Save Proxy</button>
</div>

<button onclick="runScan()">Scan Markets</button>

<div class="card">
<div class="small">Markets scanned</div>
<div class="stat" id="markets">0</div>
</div>

<div class="card">
<div class="small">Arbitrage hits</div>
<div class="stat" id="arb">0</div>
</div>

<div id="results"></div>

<script>

function saveProxy(){
const url=document.getElementById("proxy").value;
localStorage.setItem("proxy",url);
alert("Proxy saved");
}

function getProxy(){
return localStorage.getItem("proxy");
}

async function midpoint(token){

const proxy=getProxy();

const r=await fetch(proxy+"/api/midpoint?token_id="+token);
const data=await r.json();

return parseFloat(data.mid||data.mid_price);

}

async function runScan(){

document.getElementById("results").innerHTML="";
document.getElementById("markets").innerText="0";
document.getElementById("arb").innerText="0";

const proxy=getProxy();

const res=await fetch(proxy+"/api/markets");
const markets=await res.json();

let scanned=0;
let arbHits=0;

for(const m of markets){

try{

if(!m.clobTokenIds) continue;

const tokens=Array.isArray(m.clobTokenIds)
?m.clobTokenIds
:JSON.parse(m.clobTokenIds);

if(tokens.length<2) continue;

const yes=tokens[0];
const no=tokens[1];

const yesPrice=await midpoint(yes);
const noPrice=await midpoint(no);

if(!yesPrice||!noPrice) continue;

scanned++;
document.getElementById("markets").innerText=scanned;

const total=yesPrice+noPrice;

if(total<1){

arbHits++;
document.getElementById("arb").innerText=arbHits;

const div=document.createElement("div");
div.className="card";

div.innerHTML=
"<b>"+m.question+"</b><br>"+
"YES "+yesPrice.toFixed(2)+" / NO "+noPrice.toFixed(2)+"<br>"+
"EDGE "+((1-total)*100).toFixed(2)+"%";

document.getElementById("results").appendChild(div);

}

}catch(e){
continue;
}

}

}

</script>

</body>
</html>
