<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polymarket Orderbook Scanner</title>

<style>

body{
font-family:-apple-system;
background:#07111f;
color:white;
padding:20px;
}

.card{
background:#0d1b38;
padding:20px;
border-radius:16px;
margin-bottom:16px;
}

button{
background:#15d95e;
border:none;
padding:14px;
border-radius:12px;
color:white;
font-weight:bold;
width:100%;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
margin-bottom:12px;
}

.pill{
padding:6px 10px;
border-radius:20px;
font-size:12px;
}

.arb{
background:#ff3b6b33;
color:#ff7b97;
}

</style>
</head>

<body>

<h2>Polymarket Orderbook Scanner</h2>

<div class="card">

<input id="proxy" placeholder="Worker URL">

<button onclick="saveProxy()">Save Worker</button>

</div>

<button onclick="scan()">Scan Markets</button>

<div id="results"></div>

<script>

function saveProxy(){

localStorage.setItem(
"proxy",
document.getElementById("proxy").value
)

}

function parsePrices(v){

try{

const p=JSON.parse(v)

return p.map(Number)

}catch{

return[]

}

}

async function scan(){

const proxy=localStorage.getItem("proxy")

const r=await fetch(proxy+"/api/markets")

const markets=await r.json()

const results=document.getElementById("results")

results.innerHTML=""

for(const m of markets.slice(0,150)){

const prices=parsePrices(m.outcomePrices)

if(prices.length<2)continue

const yesToken=m.clobTokenIds
?JSON.parse(m.clobTokenIds)[0]
:null

const noToken=m.clobTokenIds
?JSON.parse(m.clobTokenIds)[1]
:null

if(!yesToken||!noToken)continue

const yesBook=await fetch(proxy+"/api/orderbook/"+yesToken)

const noBook=await fetch(proxy+"/api/orderbook/"+noToken)

const yesData=await yesBook.json()

const noData=await noBook.json()

const yesAsk=parseFloat(yesData.asks?.[0]?.price)

const noAsk=parseFloat(noData.asks?.[0]?.price)

if(!yesAsk||!noAsk)continue

const total=yesAsk+noAsk

if(total<1){

const edge=(1-total)*100

const div=document.createElement("div")

div.className="card"

div.innerHTML=`

<b>${m.question}</b>

<div>YES ask ${yesAsk}</div>

<div>NO ask ${noAsk}</div>

<div>Edge ${edge.toFixed(2)}%</div>

<span class="pill arb">ARBITRAGE</span>

`

results.appendChild(div)

}

}

}

</script>

</body>
</html>
