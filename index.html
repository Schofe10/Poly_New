<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polymarket Edge Stable</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont;
background:#0b0f14;
color:white;
padding:20px;
}

button{
padding:14px 20px;
background:#00c853;
border:none;
border-radius:10px;
color:white;
font-size:16px;
}

.card{
background:#111827;
padding:16px;
margin-top:14px;
border-radius:10px;
}

.stat{
font-size:28px;
font-weight:bold;
color:#00e676;
}

.small{
opacity:.7;
font-size:13px;
}
</style>
</head>

<body>

<h2>Polymarket Edge Stable</h2>
<button onclick="runScan()">Scan Markets</button>

<div class="card">
<div class="small">Markets scanned</div>
<div class="stat" id="markets">0</div>
</div>

<div class="card">
<div class="small">Arbitrage hits</div>
<div class="stat" id="arb">0</div>
</div>

<div id="results"></div>

<script>

async function fetchMarkets(){

const url="https://gamma-api.polymarket.com/markets?limit=200";

const res=await fetch(url);
const data=await res.json();

return data.filter(m=>
m.clobTokenIds && m.clobTokenIds.length>=2
);

}

async function midpoint(token){

try{

const res=await fetch(
"https://clob.polymarket.com/midpoint?token_id="+token
);

const data=await res.json();

return parseFloat(data.mid || data.mid_price);

}catch(e){

return null;

}

}

async function runScan(){

document.getElementById("results").innerHTML="";
document.getElementById("markets").innerText="0";
document.getElementById("arb").innerText="0";

const markets=await fetchMarkets();

let arbHits=0;
let scanned=0;

for(const m of markets){

try{

const yes=m.clobTokenIds[0];
const no=m.clobTokenIds[1];

const yesPrice=await midpoint(yes);
const noPrice=await midpoint(no);

if(!yesPrice||!noPrice) continue;

scanned++;

document.getElementById("markets").innerText=scanned;

const total=yesPrice+noPrice;

if(total<1){

arbHits++;

document.getElementById("arb").innerText=arbHits;

const div=document.createElement("div");
div.className="card";

div.innerHTML=
"<b>"+m.question+"</b><br>"+
"YES "+yesPrice.toFixed(2)+" / NO "+noPrice.toFixed(2)+"<br>"+
"ARB EDGE: "+((1-total)*100).toFixed(2)+"%";

document.getElementById("results").appendChild(div);

}

}catch(e){
continue;
}

}

}

</script>

</body>
</html>
